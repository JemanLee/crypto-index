<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바닥레이더">
<title>바닥 신호 레이더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d;
  --panel: #0d1219;
  --panel2: #111820;
  --border: #1a2535;
  --border2: #243040;
  --accent: #00d4ff;
  --green: #00e87a;
  --red: #ff4466;
  --yellow: #ffb830;
  --text: #ddeeff;
  --text2: #5a7a99;
  --btc: #f7931a;
  --eth: #7b93ea;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* grid bg */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    linear-gradient(rgba(0,212,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.025) 1px, transparent 1px);
  background-size: 36px 36px;
}

.wrap { position:relative; z-index:1; max-width:460px; margin:0 auto; }

/* ── HEADER ── */
.hdr {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,212,255,.06) 0%, transparent 100%);
}
.hdr-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.logo { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--accent); opacity:.7; }
.refresh-btn {
  display:flex; align-items:center; gap:5px;
  background:none; border:1px solid var(--border2); color:var(--text2);
  font-size:12px; padding:6px 13px; border-radius:8px; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all .15s;
}
.refresh-btn:active { background:var(--border); transform:scale(.96); }
.refresh-btn.spin svg { animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
h1 { font-size:21px; font-weight:900; letter-spacing:-.5px; }
.updated { font-size:10px; color:var(--text2); margin-top:3px; font-family:'Space Mono',monospace; }

/* ── PRICES ── */
.prices {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:14px 18px;
}
.price-card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:14px; padding:13px 14px;
  display:flex; flex-direction:column; gap:4px;
  position:relative; overflow:hidden;
}
.price-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.price-card.btc::before { background:linear-gradient(90deg,var(--btc),transparent); }
.price-card.eth::before { background:linear-gradient(90deg,var(--eth),transparent); }
.p-sym { font-family:'Space Mono',monospace; font-size:10px; color:var(--text2); letter-spacing:1px; }
.p-price { font-family:'Space Mono',monospace; font-size:17px; font-weight:700; }
.p-chg { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; }
.up { color:var(--green); } .dn { color:var(--red); }



/* ── SCORES ── */
.scores { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 14px; }
.score-card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:14px; padding:14px;
  position:relative; overflow:hidden;
}
.score-card::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; }
.score-card.btc::before { background:linear-gradient(90deg,var(--btc),transparent); }
.score-card.eth::before { background:linear-gradient(90deg,var(--eth),transparent); }
.sc-lbl { font-size:10px; color:var(--text2); font-family:'Space Mono',monospace; letter-spacing:1px; margin-bottom:6px; }
.sc-num { font-family:'Space Mono',monospace; font-size:34px; font-weight:700; line-height:1; }
.sc-num .mx { font-size:15px; color:var(--text2); }

/* ── TABS ── */
.tabs { display:flex; gap:8px; padding:0 18px 14px; }
.tab {
  flex:1; padding:10px 4px; border-radius:10px;
  border:1px solid var(--border); background:var(--panel);
  color:var(--text2); font-size:13px; font-weight:700;
  cursor:pointer; text-align:center; transition:all .15s;
  font-family:'Noto Sans KR',sans-serif;
}
.tab.on { background:var(--panel2); color:var(--text); border-color:var(--accent); }
.tab:active { transform:scale(.97); }

/* ── TAB CONTENT ── */
.pane { display:none; } .pane.on { display:block; }

/* ── SECTION ── */
.sec { padding:0 18px; margin-bottom:18px; }
.sec-hdr {
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px;
}
.sec-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text2); }
.sec-badge {
  margin-left:auto; font-size:10px; font-family:'Space Mono',monospace;
  padding:2px 7px; border-radius:4px;
}
.badge-live { background:rgba(0,232,122,.12); color:var(--green); }
.badge-count { background:rgba(90,122,153,.12); color:var(--text2); }

/* ── INDICATOR ── */
.ind-list { display:flex; flex-direction:column; gap:7px; }
.ind {
  background:var(--panel); border:1px solid var(--border);
  border-radius:12px; padding:13px 13px;
  display:flex; align-items:center; gap:11px;
  animation:fadeUp .35s ease both;
  transition:border-color .3s;
}
.ind.hot { border-color:rgba(0,232,122,.35); background:rgba(0,232,122,.025); }
.ind.warm { border-color:rgba(255,184,48,.25); background:rgba(255,184,48,.025); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}

.dot {
  width:9px; height:9px; border-radius:50%; flex-shrink:0;
}
.dot.active { background:var(--green); box-shadow:0 0 0 3px rgba(0,232,122,.2); animation:pulse 2s infinite; }
.dot.warn   { background:var(--yellow); box-shadow:0 0 0 3px rgba(255,184,48,.2); }
.dot.off    { background:var(--border2); }
.dot.loading { background:var(--border2); animation:blink 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(0,232,122,.2);}50%{box-shadow:0 0 0 6px rgba(0,232,122,.08);} }
@keyframes blink { 0%,100%{opacity:.3;}50%{opacity:.9;} }

.ind-body { flex:1; min-width:0; }
.ind-name { font-size:13px; font-weight:700; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ind-desc { font-size:11px; color:var(--text2); line-height:1.4; }
.ind-stars { font-size:9px; color:var(--yellow); margin-top:2px; }
.ind-thr { font-size:9px; color:var(--text2); margin-left:4px; }

.ind-val-col { text-align:right; flex-shrink:0; min-width:60px; }
.ind-val { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; white-space:nowrap; }
.ind-val.active { color:var(--green); }
.ind-val.warn   { color:var(--yellow); }
.ind-val.off    { color:var(--text2); }
.ind-val.loading { color:var(--border2); animation:blink 1s infinite; }

/* ── LINKS PANEL ── */
.links-panel {
  margin:0 18px 18px;
  background:rgba(0,212,255,.04);
  border:1px solid rgba(0,212,255,.12);
  border-radius:14px; padding:14px;
}
.links-title { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.link-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04);
}
.link-row:last-child { border-bottom:none; }
.link-name { font-size:12px; color:var(--text2); }
.link-a {
  font-size:11px; font-family:'Space Mono',monospace;
  color:var(--accent); text-decoration:none; padding:3px 8px;
  border:1px solid rgba(0,212,255,.2); border-radius:5px;
}


/* ── LOADING OVERLAY ── */
.loading-bar {
  position:fixed; top:0; left:0; right:0; height:2px; z-index:99;
  background:linear-gradient(90deg,var(--accent),var(--green),var(--accent));
  background-size:200% 100%;
  animation:loadbar 1.2s linear infinite;
  display:none;
}
.loading-bar.show { display:block; }
@keyframes loadbar { 0%{background-position:200% 0}100%{background-position:-200% 0} }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-row">

    <button class="refresh-btn" id="refreshBtn" onclick="init()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
  </div>

</div>

<!-- PRICES -->
<div class="prices">
  <div class="price-card btc">
    <div class="p-sym">BTC / USD</div>
    <div class="p-price" id="btcPrice">---</div>
    <div class="p-chg" id="btcChg">--</div>

  <div class="price-card eth">

</div>

<!-- SCORES -->
<div class="scores">

  </div>

<!-- TABS -->
<div class="tabs">

<!-- BTC PANE -->

  <div class="sec">

      <span style="font-size:15px">🟠</span>

      <span class="sec-badge badge-live">● LIVE</span>
      <span class="sec-badge badge-count" id="btcCount">--/10</span>
    </div>
    <div class="ind-list" id="btcList"></div>
  </div>
</div>

<!-- ETH PANE -->
<div class="pane" id="pane-eth">
  <div class="sec">
    <div class="sec-hdr">
      <span style="font-size:15px">🔵</span>
      <span class="sec-title">ETH 바닥 지표</span>
      <span class="sec-badge badge-live">● LIVE</span>
      <span class="sec-badge badge-count" id="ethCount">--/12</span>
    </div>
    <div class="ind-list" id="ethList"></div>
  </div>
</div>





</div><!-- /wrap -->

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const D = {
  btcPrice:null, ethPrice:null,
  btcChange24h:null, ethChange24h:null,
  btcAth:null, ethAth:null,
  btcMcap:null, ethMcap:null, totalMcap:null,
  btcMa200:null, ethMa200:null,
  btcMa200w:null, ethMa200w:null,
  btcRsi:null, ethRsi:null,
  btcFunding:null, ethFunding:null,
  btcZScore:null, ethZScore:null,
  btcBBPercent:null, ethBBPercent:null,
  btcOIChange:null, ethOIChange:null,
  fearGreed:null, fearGreedLabel:null,
  stableCap:null,
};

// ═══════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════
async function safe(fn) { try { await fn(); } catch(e) { console.warn(e); } }

async function fetchCoinGecko() {
  const r = await fetch(
    'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd' +
    '&ids=bitcoin,ethereum,tether,usd-coin' +
    '&order=market_cap_desc&per_page=10&page=1' +
    '&price_change_percentage=24h'
  );
  const list = await r.json();
  const get = id => list.find(c => c.id === id);
  const btc = get('bitcoin'), eth = get('ethereum');
  const usdt = get('tether'), usdc = get('usd-coin');
  if (btc) {
    D.btcPrice = btc.current_price;
    D.btcAth = btc.ath;
    D.btcChange24h = btc.price_change_percentage_24h;
    D.btcMcap = btc.market_cap;
  }
  if (eth) {
    D.ethPrice = eth.current_price;
    D.ethAth = eth.ath;
    D.ethChange24h = eth.price_change_percentage_24h;
    D.ethMcap = eth.market_cap;
  }
  D.stableCap = (usdt?.market_cap||0) + (usdc?.market_cap||0);
}

async function fetchGlobal() {
  const r = await fetch('https://api.coingecko.com/api/v3/global');
  const g = (await r.json()).data;
  D.totalMcap = g?.total_market_cap?.usd;
}

async function fetchFearGreed() {
  const r = await fetch('https://api.alternative.me/fng/?limit=1');
  const d = (await r.json()).data[0];
  D.fearGreed = parseFloat(d.value);
  D.fearGreedLabel = d.value_classification;
}

async function fetchFunding() {
  const [rb, re] = await Promise.all([
    fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
    fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=ETHUSDT&limit=1'),
  ]);
  const db = await rb.json();
  const de = await re.json();
  if (db[0]) D.btcFunding = parseFloat(db[0].fundingRate);
  if (de[0]) D.ethFunding = parseFloat(de[0].fundingRate);
}

function calcRSI(closes, period=14) {
  if (closes.length < period+1) return null;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) {
    const diff = closes[i]-closes[i-1];
    if (diff>=0) gains+=diff; else losses-=diff;
  }
  let avgGain=gains/period, avgLoss=losses/period;
  for (let i=period+1; i<closes.length; i++) {
    const diff = closes[i]-closes[i-1];
    avgGain = (avgGain*(period-1)+(diff>0?diff:0))/period;
    avgLoss = (avgLoss*(period-1)+(diff<0?-diff:0))/period;
  }
  if (avgLoss===0) return 100;
  return 100 - 100/(1+avgGain/avgLoss);
}

function calcZScore(closes) {
  if (closes.length < 30) return null;
  const mean = closes.reduce((a,b)=>a+b,0)/closes.length;
  const variance = closes.reduce((s,v)=>s+(v-mean)**2,0)/closes.length;
  const std = Math.sqrt(variance);
  if (std===0) return 0;
  return (closes[closes.length-1] - mean) / std;
}

function calcBollingerPctB(closes, period=20, k=2) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  const mean = slice.reduce((a,b)=>a+b,0)/period;
  const variance = slice.reduce((s,v)=>s+(v-mean)**2,0)/period;
  const std = Math.sqrt(variance);
  if (std===0) return 0.5;
  const upper = mean + k*std;
  const lower = mean - k*std;
  return (closes[closes.length-1] - lower) / (upper - lower);
}

async function fetchKlines() {
  const [rb, re] = await Promise.all([
    fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365'),
    fetch('https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1d&limit=365'),
  ]);
  const kb = await rb.json();
  const ke = await re.json();
  if (Array.isArray(kb) && kb.length >= 200) {
    const c = kb.map(k => parseFloat(k[4]));
    const last200 = c.slice(-200);
    D.btcMa200 = last200.reduce((a,b)=>a+b,0)/last200.length;
    D.btcRsi = calcRSI(c);
    D.btcZScore = calcZScore(c);
    D.btcBBPercent = calcBollingerPctB(c);
  }
  if (Array.isArray(ke) && ke.length >= 200) {
    const c = ke.map(k => parseFloat(k[4]));
    const last200 = c.slice(-200);
    D.ethMa200 = last200.reduce((a,b)=>a+b,0)/last200.length;
    D.ethRsi = calcRSI(c);
    D.ethZScore = calcZScore(c);
    D.ethBBPercent = calcBollingerPctB(c);
  }
}

async function fetchWeeklyKlines() {
  const [rb, re] = await Promise.all([
    fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=200'),
    fetch('https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1w&limit=200'),
  ]);
  const kb = await rb.json();
  const ke = await re.json();
  if (Array.isArray(kb) && kb.length >= 200) {
    const c = kb.map(k => parseFloat(k[4]));
    D.btcMa200w = c.reduce((a,b)=>a+b,0)/c.length;
  }
  if (Array.isArray(ke) && ke.length >= 200) {
    const c = ke.map(k => parseFloat(k[4]));
    D.ethMa200w = c.reduce((a,b)=>a+b,0)/c.length;
  }
}

async function fetchOIHistory() {
  const [rb, re] = await Promise.all([
    fetch('https://fapi.binance.com/futures/data/openInterestHist?symbol=BTCUSDT&period=1d&limit=8'),
    fetch('https://fapi.binance.com/futures/data/openInterestHist?symbol=ETHUSDT&period=1d&limit=8'),
  ]);
  const db = await rb.json();
  const de = await re.json();
  if (Array.isArray(db) && db.length >= 2) {
    const oldest = parseFloat(db[0].sumOpenInterest);
    const newest = parseFloat(db[db.length-1].sumOpenInterest);
    D.btcOIChange = (newest - oldest) / oldest * 100;
  }
  if (Array.isArray(de) && de.length >= 2) {
    const oldest = parseFloat(de[0].sumOpenInterest);
    const newest = parseFloat(de[de.length-1].sumOpenInterest);
    D.ethOIChange = (newest - oldest) / oldest * 100;
  }
}

// ═══════════════════════════════════════════════
//  INDICATORS
// ═══════════════════════════════════════════════
function sig(condition, warnCondition) {
  if (condition) return 'active';
  if (warnCondition) return 'warn';
  return 'off';
}
function loading(val) { return val == null ? 'loading' : null; }

function pct(a, b) { return ((a/b - 1)*100).toFixed(1); }
function fmt(n, d=0) { return n==null?'---':n.toLocaleString('en-US',{maximumFractionDigits:d}); }
function fmtB(n) {
  if(n==null) return '---';
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  return n.toFixed(0);
}

function getBtcIndicators() {
  const stable = D.stableCap;
  return [
    {
      name:'200일 이동평균선',
      stars:'★★★★★',
      thr:'현재가 < 200일 MA = 바닥 신호',
      status: loading(D.btcPrice||D.btcMa200) || sig(D.btcPrice < D.btcMa200, D.btcPrice < D.btcMa200*1.08),
      value: D.btcMa200 ? '$'+fmt(D.btcMa200) : null,
      desc: D.btcMa200 ? (D.btcPrice < D.btcMa200
        ? `200MA $${fmt(D.btcMa200)} — ${pct(D.btcPrice,D.btcMa200)}% 이하 🔴`
        : `200MA $${fmt(D.btcMa200)} — +${pct(D.btcPrice,D.btcMa200)}% 위`)
        : '로딩 중...',
    },
    {
      name:'ATH 대비 낙폭 (MDD)',
      stars:'★★★★☆',
      thr:'-50% 이하 = 바닥권 진입',
      status: loading(D.btcPrice&&D.btcAth) || sig((D.btcPrice/D.btcAth-1)*100<=-50, (D.btcPrice/D.btcAth-1)*100<=-35),
      value: D.btcAth ? pct(D.btcPrice,D.btcAth)+'%' : null,
      desc: D.btcAth ? `ATH $${fmt(D.btcAth)}대비 ${pct(D.btcPrice,D.btcAth)}%` : '로딩 중...',
    },
    {
      name:'Funding Rate (BTC)',
      stars:'★★★★★',
      thr:'< -0.03% = 숏 과잉',
      status: loading(D.btcFunding) || sig(D.btcFunding<=-0.0003, D.btcFunding<=-0.0001),
      value: D.btcFunding!=null ? (D.btcFunding*100).toFixed(4)+'%' : null,
      desc: D.btcFunding!=null
        ? (D.btcFunding<=-0.0003?'숏스퀴즈 임박 🔴':D.btcFunding<=-0.0001?'음수 펀딩 ⚠️':'정상 구간')
        : '로딩 중...',
    },
    {
      name:'Fear & Greed Index',
      stars:'★★★★★',

//  RENDER
// ═══════════════════════════════════════════════
function renderList(containerId, indicators) {
  const el = document.getElementById(containerId);
  if (!el) return 0;
  el.innerHTML = '';
  let activeCount = 0;
  indicators.forEach((ind, i) => {
    const st = ind.status;
    if (st === 'active') activeCount++;
    const card = document.createElement('div');
    card.className = `ind ${st==='active'?'hot':st==='warn'?'warm':''}`;
    card.style.animationDelay = (i*0.04)+'s';
    card.innerHTML = `
      <div class="dot ${st}"></div>
      <div class="ind-body">
        <div class="ind-name">${ind.name}</div>
        <div class="ind-desc">${ind.desc}</div>
        <div class="ind-stars">${ind.stars}<span class="ind-thr">${ind.thr}</span></div>
      </div>
      <div class="ind-val-col">
        <div class="ind-val ${st}">${ind.value ?? '...'}</div>
      </div>
    `;
    el.appendChild(card);
  });
  return activeCount;
}


function renderAll() {
  // prices
  if (D.btcPrice) {
    document.getElementById('btcPrice').textContent = '$'+fmt(D.btcPrice);
    const c = D.btcChange24h;
    const el = document.getElementById('btcChg');
    el.textContent = (c>=0?'+':'')+c?.toFixed(2)+'%';
    el.className = 'p-chg '+(c>=0?'up':'dn');
  }
  if (D.ethPrice) {
    document.getElementById('ethPrice').textContent = '$'+fmt(D.ethPrice);
    const c = D.ethChange24h;
    const el = document.getElementById('ethChg');
    el.textContent = (c>=0?'+':'')+c?.toFixed(2)+'%';
    el.className = 'p-chg '+(c>=0?'up':'dn');
  }

  // indicators
  const btcA = renderList('btcList', getBtcIndicators());
  const ethA = renderList('ethList', getEthIndicators());

  // scores
  document.getElementById('btcScoreNum').innerHTML = `${btcA}<span class="mx">/10</span>`;
  document.getElementById('btcCount').textContent = `${btcA}/10 활성`;

  document.getElementById('ethScoreNum').innerHTML = `${ethA}<span class="mx">/12</span>`;
  document.getElementById('ethCount').textContent = `${ethA}/12 활성`;

  // time
  document.getElementById('updatedTime').textContent =
    '업데이트: '+new Date().toLocaleString('ko-KR');
}

// ═══════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════
async function init() {
  document.getElementById('loadingBar').classList.add('show');
  document.getElementById('refreshBtn').classList.add('spin');

  await Promise.allSettled([
    safe(fetchCoinGecko),
    safe(fetchGlobal),
    safe(fetchFearGreed),
    safe(fetchFunding),
    safe(fetchKlines),
    safe(fetchWeeklyKlines),
    safe(fetchOIHistory),
  ]);

  renderAll();
  document.getElementById('loadingBar').classList.remove('show');
  document.getElementById('refreshBtn').classList.remove('spin');
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('pane-'+name).classList.add('on');
}

init();
setInterval(init, 5*60*1000);
